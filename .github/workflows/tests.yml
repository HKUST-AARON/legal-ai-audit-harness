name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests
      - run: python -m audit_harness.cli run examples/scenarios
      - run: python -m audit_harness.cli experiment examples/scenarios --out reports/experiment_report.md --json-out reports/experiment_report.json
      - run: python -m audit_harness.cli sensitivity examples/scenarios --out reports/sensitivity_report.md --json-out reports/sensitivity_report.json
      - run: python -m audit_harness.cli experiment experiments/issue_gold_sets/scenarios
      - run: python -m audit_harness.cli experiment experiments/ai_outputs/scenarios
      - run: python -m audit_harness.cli experiment experiments/real_cases/scenarios
      - run: python scripts/collect_public_system_outputs.py
      - run: python -m audit_harness.cli experiment experiments/public_system_outputs/scenarios
      - run: python scripts/run_repair_frontier_analysis.py
      - run: python scripts/run_jurisdiction_profile_analysis.py
      - run: python scripts/run_full_validation.py
      - run: python scripts/verify_claim_consistency.py
